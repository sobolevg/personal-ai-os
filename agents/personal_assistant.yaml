name: personal_assistant
status: draft
role: telegram_capture_front_door
contract: agents/personal_assistant.agent.json
prompt: prompts/agents/personal_assistant_router.md
owned_routes:
  - task
  - resource
  - expense
  - inbox
routing_contract:
  default_route: inbox
  deterministic_reference: integrations/routing/capture_router.py
  dispatch_reference: integrations/routing/capture_dispatch.py
  fixed_examples: tests/fixtures/capture_router/examples.json
  dispatch_examples: tests/fixtures/capture_router/dispatch_examples.json
rules:
  - never_route_to_internal_hermes_todo
  - prefer_inbox_when_unclear
  - do_not_redesign_notion_workspace
  - do_not_bulk_edit_notion_without_confirmation
  - do_not_write_resource_or_expense_until_contracts_are_filled
  - preserve_source_platform_and_message_id
targets:
  task: notion.tasks
  resource: notion.resources
  expense: notion.expenses
  inbox: notion.inbox_candidate
